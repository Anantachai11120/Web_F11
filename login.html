<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabFlow | เข้าสู่ระบบ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <a class="brand-link" href="index.html" aria-label="LMDIFY F11 - หน้าหลัก">
        <img class="brand-logo" src="image/IconLab.png" alt="LMDIFY F11 icon" onerror="this.style.display='none'" />
        <span class="brand" data-i18n="brandName">แลปชั้นใต้ดิน F11</span>
      </a>
      <nav class="nav">
        <label class="lang-inline"><select id="languageSelect" class="lang-select"><option value="en" data-i18n="langEN">English</option><option value="th" data-i18n="langTH">ไทย</option></select></label>
        <a href="index.html" data-i18n="navHome"><span class="nav-link-content"><img class="nav-icon" src="/image/home-icon-silhouette.png" alt="" aria-hidden="true" /><span class="nav-label">หน้าหลัก</span></span></a>
        <a href="rooms.html" data-i18n="navRooms"><span class="nav-link-content"><img class="nav-icon" src="/image/meeting-room.png" alt="" aria-hidden="true" /><span class="nav-label">จองห้อง</span></span></a>
        <a href="equipment.html" data-i18n="navEquipment"><span class="nav-link-content"><img class="nav-icon" src="/image/maintenance.png" alt="" aria-hidden="true" /><span class="nav-label">จองอุปกรณ์</span></span></a>
        <a href="about.html" data-i18n="navAbout"><span class="nav-link-content"><img class="nav-icon" src="/image/about.png" alt="" aria-hidden="true" /><span class="nav-label">เกี่ยวกับเรา</span></span></a>
        <a href="profile.html" class="auth-only" hidden data-i18n="navProfile"><span class="nav-link-content"><img class="nav-icon" src="/image/user.png" alt="" aria-hidden="true" /><span class="nav-label">โปรไฟล์</span></span></a>
        <a href="login.html" data-i18n="navLogin">เข้าสู่ระบบ</a>
        <a href="admin.html" class="admin-only" hidden data-i18n="navAdmin">แอดมิน</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="grid">
        <article class="card">
          <h2>ฟอร์มเข้าสู่ระบบ</h2>
          <form id="loginForm">
            <label for="loginEmail">ชื่อผู้ใช้ หรือ อีเมล</label>
            <input id="loginEmail" type="text" placeholder="เช่น Anantachai2000 หรือ name@univ.ac.th" />

            <label for="loginPassword">รหัสผ่าน</label>
            <div class="password-input-wrap">
              <input id="loginPassword" type="password" placeholder="รหัสผ่าน" />
              <button type="button" id="toggleLoginPassword" class="password-toggle-btn" aria-label="toggle password visibility">
                <img class="password-toggle-icon" src="image/hidden.png" alt="toggle password" />
              </button>
            </div>

            <button type="submit">เข้าสู่ระบบ</button>
            <div id="loginNotice" class="notice" hidden></div>
          </form>
          <p class="muted" style="margin-top:0.7rem;">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></p>
        </article>
      </section>
    </div>
  </main>

  <footer class="container footer">LabFlow <span id="year"></span></footer>
  <script src="assets/app.js"></script>
</body>
</html>
