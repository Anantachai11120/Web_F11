<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabFlow | สมัครสมาชิก</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <a class="brand-link" href="index.html" aria-label="LMDIFY F11 - หน้าหลัก">
        <img class="brand-logo" src="image/IconLab.png" alt="LMDIFY F11 icon" onerror="this.style.display='none'" />
        <span class="brand" data-i18n="brandName">แลปชั้นใต้ดิน F11</span>
      </a>
      <nav class="nav">
        <label class="lang-inline"><select id="languageSelect" class="lang-select"><option value="en" data-i18n="langEN">English</option><option value="th" data-i18n="langTH">ไทย</option></select></label>
        <a href="index.html" data-i18n="navHome"><span class="nav-link-content"><img class="nav-icon" src="/image/home-icon-silhouette.png" alt="" aria-hidden="true" /><span class="nav-label">หน้าหลัก</span></span></a>
        <a href="rooms.html" data-i18n="navRooms"><span class="nav-link-content"><img class="nav-icon" src="/image/meeting-room.png" alt="" aria-hidden="true" /><span class="nav-label">จองห้อง</span></span></a>
        <a href="equipment.html" data-i18n="navEquipment"><span class="nav-link-content"><img class="nav-icon" src="/image/maintenance.png" alt="" aria-hidden="true" /><span class="nav-label">จองอุปกรณ์</span></span></a>
        <a href="index.html#labAboutSection" data-i18n="navAbout"><span class="nav-link-content"><img class="nav-icon" src="/image/about.png" alt="" aria-hidden="true" /><span class="nav-label">เกี่ยวกับเรา</span></span></a>
        <a href="profile.html" class="auth-only" hidden data-i18n="navProfile"><span class="nav-link-content"><img class="nav-icon" src="/image/user.png" alt="" aria-hidden="true" /><span class="nav-label">โปรไฟล์</span></span></a>
        <a href="login.html" data-i18n="navLogin">เข้าสู่ระบบ</a>
        <a href="admin.html" class="admin-only" hidden data-i18n="navAdmin">แอดมิน</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <section class="hero">
        <h1>สมัครสมาชิกระบบแลป</h1>
        <p>สร้างบัญชีผู้ใช้เพื่อจองห้องและอุปกรณ์ โดยหลังสมัครต้องยืนยันบัญชีก่อนเข้าสู่ระบบ</p>
      </section>

      <section class="grid grid-2 single-col">
        <article class="card">
          <h2>ฟอร์มสมัครสมาชิก</h2>
          <form id="registerForm">
            <label for="regName">ชื่อ-นามสกุล</label>
            <input id="regName" type="text" placeholder="ชื่อผู้ใช้งาน" />

            <label for="regStudentId">รหัสนักศึกษา</label>
            <input id="regStudentId" type="text" placeholder="เช่น B6501234" />

            <label for="regYear">ชั้นปี</label>
            <select id="regYear">
              <option value="">เลือกชั้นปี</option>
              <option>ปี 1</option>
              <option>ปี 2</option>
              <option>ปี 3</option>
              <option>ปี 4</option>
              <option>ปี 5+</option>
            </select>

            <label for="regSchool">สำนัก</label>
            <input id="regSchool" type="text" placeholder="เช่น สำนักวิชาวิศวกรรมศาสตร์" />

            <label for="regMajor">สาขา</label>
            <input id="regMajor" type="text" placeholder="เช่น วิศวกรรมคอมพิวเตอร์" />

            <label for="regPhone">เบอร์ติดต่อ</label>
            <input id="regPhone" type="tel" placeholder="เช่น 08xxxxxxxx" />

            <label for="regUsername">ชื่อผู้ใช้</label>
            <input id="regUsername" type="text" placeholder="เช่น anan01" />

            <label for="regEmail">อีเมล</label>
            <input id="regEmail" type="email" placeholder="name@univ.ac.th" />

            <label for="regPassword">รหัสผ่าน</label>
            <div class="password-input-wrap">
              <input id="regPassword" type="password" placeholder="อย่างน้อย 6 ตัวอักษร" />
              <button type="button" id="toggleRegPassword" class="password-toggle-btn" aria-label="toggle password visibility">
                <img class="password-toggle-icon" src="image/hidden.png" alt="toggle password" />
              </button>
            </div>

            <label for="regConfirmPassword">ยืนยันรหัสผ่าน</label>
            <div class="password-input-wrap">
              <input id="regConfirmPassword" type="password" placeholder="กรอกรหัสผ่านอีกครั้ง" />
              <button type="button" id="toggleRegConfirmPassword" class="password-toggle-btn" aria-label="toggle password visibility">
                <img class="password-toggle-icon" src="image/hidden.png" alt="toggle password" />
              </button>
            </div>

            <label for="regProfileImage">อัปโหลดภาพโปรไฟล์</label>
            <input id="regProfileImage" type="file" accept="image/*" />

            <button type="submit">สมัครสมาชิก</button>
            <div id="registerNotice" class="notice" hidden></div>
          </form>
        </article>
      </section>
    </div>
  </main>

  <div id="registerLoadingOverlay" class="register-loading-backdrop" hidden>
    <div class="register-loading-card">
      <div class="register-loading-spinner" aria-hidden="true"></div>
      <h3>กำลังส่งรหัสยืนยัน</h3>
      <p>กรุณารอสักครู่ ระบบกำลังตรวจสอบข้อมูลและส่ง OTP ไปยังอีเมล</p>
    </div>
  </div>

  <footer class="container footer">LabFlow <span id="year"></span></footer>
  <script src="assets/app.js"></script>
</body>
</html>
